<!DOCTYPE html>
<html lang="en">

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
        <div class="text-xl font-bold text-emerald-600">EnglishTracker</div>
        
        <div class="flex items-center gap-8 text-sm font-medium text-gray-600">
            <nav class="flex gap-6">
                <a href="#" class="hover:text-emerald-600 transition">Road-map</a>
                <a href="#" class="hover:text-emerald-600 transition">Podcast</a>
                <a href="#" class="hover:text-emerald-600 transition">Pronunciation</a>
                <a href="#" class="hover:text-emerald-600 transition">Diary</a>
                <a href="#" class="hover:text-emerald-600 transition">Movie</a>
                <a href="#" class="hover:text-emerald-600 transition">Mini story</a>
                <a href="#" class="hover:text-emerald-600 transition">Talk with AJ</a>
            </nav>
            <div class="flex items-center gap-3 border-l pl-6">
                <span class="text-gray-500">ducanhnguyenxuan51@gmail.com</span>
                <div class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center overflow-hidden border-2 border-emerald-100">
                    <svg class="w-6 h-6 text-gray-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Current Status</h2>
            <div class="space-y-4">
                <label class="flex items-center gap-4 p-3 rounded-lg hover:bg-emerald-50 transition cursor-pointer border border-transparent hover:border-emerald-100">
                    <input type="checkbox" class="w-5 h-5 rounded border-gray-300 text-emerald-600 focus:ring-emerald-500">
                    <span class="text-gray-700 font-medium">Mini Story</span>
                </label>
                <label class="flex items-center gap-4 p-3 rounded-lg hover:bg-emerald-50 transition cursor-pointer border border-transparent hover:border-emerald-100">
                    <input type="checkbox" class="w-5 h-5 rounded border-gray-300 text-emerald-600 focus:ring-emerald-500">
                    <span class="text-gray-700 font-medium">Talk With AJ</span>
                </label>
                <label class="flex items-center gap-4 p-3 rounded-lg hover:bg-emerald-50 transition cursor-pointer border border-transparent hover:border-emerald-100">
                    <input type="checkbox" class="w-5 h-5 rounded border-gray-300 text-emerald-600 focus:ring-emerald-500">
                    <span class="text-gray-700 font-medium">Podcast</span>
                </label>
                <label class="flex items-center gap-4 p-3 rounded-lg hover:bg-emerald-50 transition cursor-pointer border border-transparent hover:border-emerald-100">

                </label>
                <label class="flex items-center gap-4 p-3 rounded-lg hover:bg-emerald-50 transition cursor-pointer border border-transparent hover:border-emerald-100">

                    <span class="text-gray-700 font-medium">Write Diary</span>
                </label>
                <label class="flex items-center gap-4 p-3 rounded-lg hover:bg-emerald-50 transition cursor-pointer border border-transparent hover:border-emerald-100">
                    <input type="checkbox" class="w-5 h-5 rounded border-gray-300 text-emerald-600 focus:ring-emerald-500">
                    <span class="text-gray-700 font-medium">Movie</span>
                </label>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 flex flex-col">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Roadmap</h2>
            <div class="flex-1 border-2 border-dashed border-gray-200 rounded-xl flex items-center justify-center bg-gray-50/50">
                <p class="text-gray-400 font-medium">Your roadmap will appear here</p>
            </div>
        </div>

    </main>

</html>
